version: "3.9"

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  db:
    image: postgres:16-alpine
    container_name: craftistan-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-craftistan}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-craftistan}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================
  # Craftistan Backend Application
  # ============================================
  app:
    container_name: craftistan-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      # Spring profile
      SPRING_PROFILES_ACTIVE: prod

      # Database
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-craftistan}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}

      # Security
      JWT_SECRET: ${JWT_SECRET}

      # Gemini AI
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}

      # SMTP (Brevo)
      BREVO_SMTP_USER: ${BREVO_SMTP_USER:-}
      BREVO_SMTP_KEY: ${BREVO_SMTP_KEY:-}

      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
    volumes:
      - uploads_data:/app/uploads
    env_file:
      - .env

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
