# Craftistan Backend
server:
  port: 8080

spring:
  application:
    name: craftistan-backend

  profiles:
    active: dev




  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Flyway
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # File Upload
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 25MB

  # Mail (Brevo SMTP)
  mail:
    host: smtp-relay.brevo.com
    port: 587
    username: ${BREVO_SMTP_USER:}
    password: ${BREVO_SMTP_KEY:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Application Properties
app:
  name: Craftistan
  jwt:
    secret: ${JWT_SECRET:craftistan-super-secret-key-that-should-be-at-least-256-bits-long-for-security}
    expiration: 86400000 # 24 hours in milliseconds
  upload:
    dir: ./uploads
    max-size: 5242880 # 5MB in bytes
    allowed-types: image/jpeg,image/png,image/webp
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  gemini:
    api-key: ${GEMINI_API_KEY:}  # Set via environment variable
    model: gemini-2.5-flash
    max-tokens: 1024

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

# Logging
logging:
  level:
    com.craftistan: INFO
    org.springframework.security: INFO
