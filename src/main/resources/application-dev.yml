# Development Profile
spring:
  # PostgreSQL Database for development
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:craftistan}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:aziz890}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false

# Logging
logging:
  level:
    com.craftistan: DEBUG
    org.springframework.web: DEBUG
